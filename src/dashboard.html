
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="author" content="">

    <meta name="viewport" content="target-densitydpi=device-dpi, initial-scale=1.0, user-scalable=no" />


    <link rel="shortcut icon" href="assets/ico/favicon.png">

    <title>Twitterdashboard - Projectgroep 14</title>

    <!-- Bootstrap core CSS -->
    <link href="css/bootstrap.css" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link href="css/grid.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
	<link href='http://fonts.googleapis.com/css?family=Open+Sans:400,700' rel='stylesheet' type='text/css'>

    <script type="text/javascript" src="lib/js/require.js"></script>
    <script type="text/javascript" src="js/requirejs-config.js"></script>
    <script type="text/javascript">
      requirejs(["main"], function(main) {
      $(function () {
        main.run();
      });
      });
    </script>

    <!-- HTML5 shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!--[if lt IE 9]>
      <script src="js/html5shiv.js"></script>
      <script src="js/respond.min.js"></script>
    <![endif]-->
  </head>

  <body>

    <div id="personal-container" class="hidden-container" onclick="toggleElement('#personal-container')">
      <div class="row">
        <div class="col-md-12 hidden-tweetcontainer" id="personal-tweets">
          <h3>Persoonlijke tweets</h3>
          <div id="personal-tweetcontainer"></div>
        </div>
      </div>
    </div>
    <div id="results-container" class="hidden-container" onclick="toggleElement('#results-container')">
      <div class="row">
        <div class="col-md-12 hidden-tweetcontainer" id="results-tweets">
          <h3>Resultaten tweets</h3>
          <div id="results-tweetcontainer"></div>
        </div>
      </div>
    </div>
    <div id="useful-container" class="hidden-container" onclick="toggleElement('#useful-container')">
      <div class="row">
        <div class="col-md-12 hidden-tweetcontainer" id="useful-tweets">
          <h3>Nuttige tweets</h3>
          <div id="useful-tweetcontainer"></div>
        </div>
      </div>
    </div>
    <div id="team-container" class="hidden-container" onclick="toggleElement('#team-container')">
      <div class="row">
        <div class="col-md-12 hidden-tweetcontainer" id="team-tweets">
          <h3>Team tweets</h3>
          <div id="team-tweetcontainer"></div>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="page-header">
        <h1>Batavierenrace Twitterdashboard</h1>
      </div>

      <div class="row">
        <div class="col-md-8 content-box" id="tweetcontainer">
          <h3>Tweets</h3>
          <div id="tweets"></div>
        </div>
        <div class="col-md-4 content-box" id="graphcontainer">
          <h3>Race Stats</h3>
          <div id="graph">
          </div>
          <div id="bar1Click" onclick="toggleElement('#personal-container')"></div>
          <div id="bar2Click" onclick="toggleElement('#results-container')"></div>
          <div id="bar3Click" onclick="toggleElement('#useful-container')"></div>
          <div id="bar4Click" onclick="toggleElement('#team-container')"></div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 content-box" id="directions">
          <iframe id="directionframe" src="edited_deel3.html" width="100%" height="268"></iframe>
        </div>
        <div class="col-md-4 content-box" id="maps">
          <div id="map-canvas"></div>
        </div>
        <div id="buienradar" class="col-md-4 content-box">
          <img border="0" src="http://www.buienradar.nl/images.aspx?jaar=-3&soort=sp-loop">
        </div>
      </div>

    </div> <!-- /container -->


    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->

    <script type="text/javascript" src="http://code.jquery.com/jquery-1.8.2.min.js"></script>

    <!-- Maps JS -->
    <style type="text/css">
      html { height: 100% }
      body { height: 100%; margin: 0; padding: 0 }
      #map-canvas { height: 100% }
    </style>
    <script type="text/javascript"
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAq09M2YE_TQihS1p0XEl3nVl8zVTpNQrs&sensor=false">
    </script>
    <script type="text/javascript">
    function initialize() {
        var styles = [
          {
            "featureType": "road.highway",
            "stylers": [
              { "visibility": "off" }
            ]
          },{
            "featureType": "transit",
            "stylers": [
              { "visibility": "off" }
            ]
          },{
            "featureType": "water",
            "stylers": [
              { "visibility": "simplified" }
            ]
          },{
            "stylers": [
              { "hue": "#004cff" },
              { "saturation": -35 },
              { "gamma": 0.43 }
            ]
          },{
            "featureType": "road.arterial",
            "elementType": "labels",
            "stylers": [
              { "visibility": "off" }
            ]
          },{
            "featureType": "road.local",
            "stylers": [
              { "gamma": 0.52 }
            ]
          },{
            "featureType": "landscape",
            "stylers": [
              { "visibility": "off" }
            ]
          },{
            "featureType": "poi",
            "stylers": [
              { "visibility": "off" }
            ]
          }
        ];
        var mapOptions = {
          center: new google.maps.LatLng(52.007278,6.4069489999999405),
          zoom: 8,
          mapTypeId: google.maps.MapTypeId.ROADMAP,
          styles: styles
        };
        var map = new google.maps.Map(document.getElementById("map-canvas"),
            mapOptions);

        var bataOverlay = new google.maps.KmlLayer({
          url: 'http://www.kevinalberts.nl/batavierenrace.kml'
        });
        bataOverlay.setMap(map);
      }
      google.maps.event.addDomListener(window, 'load', initialize);
    </script>

    <!-- Popup Javascript -->
    <script type="text/javascript" src="js/popups.js"></script>

  </body>
</html>
