
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="shortcut icon" href="assets/ico/favicon.png">

    <title>Twitterdashboard - Projectgroep 14</title>

    <!-- Bootstrap core CSS -->
    <link href="css/bootstrap.css" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link href="css/grid.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">

    <script type="text/javascript" src="lib/js/require.js"></script>
    <script type="text/javascript" src="js/requirejs-config.js"></script>
    <script type="text/javascript">
      requirejs(["main"], function(main) {
      $(function () {
        main.run();
      });
      });
    </script>

    <!-- HTML5 shim and Respond.js IE8 support of HTML5 elements and media queries -->

  <body>
    <div class="container">

      <div class="page-header">
        <h1>Batavierenrace Twitterdashboard</h1>
      </div>

      <div class="row">
        <div class="col-md-8" id="tweetcontainer">
          <h3>Tweets</h3>
          <div id="tweets"></div>
        </div>
        <div class="col-md-4" id="graphcontainer">
          <h3>Speed & Distance</h3>
          <div id="speed">
            <p>&nbsp;</p>
            <p>Speed: 500km/h</p>
            <p>&nbsp;</p>
            <p>Distance: 10m</p>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-4" id="directions">
          <h3>Directions</h3>
        </div>
        <div class="col-md-4" id="maps">
          <h3>Maps</h3>
          <iframe id="googlemaps" src="http://mapsengine.google.com/map/embed?mid=znL43GCROZk4.kAmfp1PHk7P8" width="300" height="300"></iframe>
        </div>
        <div id="buienradar" class="col-md-4">
          <h3>Buienradar</h3>
          <img border="0" src="http://m.buienradar.nl/">
        </div>
      </div>

    </div> <!-- /container -->

    ================================================== -->
